<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>備品計算アプリ</title>
<style>
:root {
  --bg:#f4f5f8; --card:#fff; --text:#1f2a44; --sub:#6b7280; --accent:#ff8a3d; --line:#e5e7eb;
  --shadow:0 10px 24px rgba(0,0,0,.08); --radius:22px;
}
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Meiryo",sans-serif; }
.app { max-width: 520px; margin: 0 auto; min-height: 100vh; padding: 16px 16px 44px; }
.screen { display:none; }
.screen.active { display:block; }
h1 { font-size: 28px; margin: 10px 0 6px; line-height:1.2; }
.sub { color:var(--sub); margin:0 0 18px; font-size:14px; }
.actions { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:18px; }
.btn { border:none; border-radius:18px; padding:14px 18px; font-size:16px; font-weight:800; cursor:pointer; box-shadow:var(--shadow); }
.btn-main { background:var(--accent); color:#fff; }
.btn-sub { background:#fff; color:var(--text); }
.btn-danger { background:#fff0f0; color:#c62828; }
.summary-pill { background:#fff; border-radius:20px; box-shadow:var(--shadow); padding:16px 18px; display:flex; justify-content:space-between; align-items:center; font-size:18px; font-weight:900; margin:14px 0 18px; }
.grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; }
.card { background:#fff; border-radius:22px; box-shadow:var(--shadow); overflow:hidden; position:relative; }
.card button { width:100%; border:none; background:none; padding:0; text-align:left; cursor:pointer; }
.thumb-wrap { width:100%; aspect-ratio:1/1; background:#f7f7f7; }
.thumb { width:100%; height:100%; object-fit:contain; display:block; background:#f7f7f7; }
.card-body { padding:12px 12px 14px; }
.name { font-size:16px; font-weight:900; line-height:1.35; min-height:2.7em; }
.price { margin:6px 0 0; color:var(--sub); font-size:13px; }
.qty-badge { position:absolute; top:10px; right:10px; min-width:34px; height:34px; padding:0 10px; border-radius:999px; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:900; box-shadow:var(--shadow); }
.back { display:inline-block; font-weight:800; margin:8px 0 12px; cursor:pointer; }
.panel { background:#fff; border-radius:24px; box-shadow:var(--shadow); padding:16px; }
.detail-image { width:100%; aspect-ratio:1/1; object-fit:contain; background:#f7f7f7; border-radius:20px; display:block; }
.detail-title { font-size:28px; font-weight:900; line-height:1.25; margin:14px 0 6px; }
.detail-price { color:var(--sub); font-size:17px; margin-bottom:12px; }
.variant-box { display:none; margin: 8px 0 14px; }
.variant-label { font-size:14px; font-weight:800; margin-bottom:8px; }
.variant-select { width:100%; border:2px solid #ffd9bf; border-radius:14px; padding:14px; font-size:16px; font-weight:800; background:#fffaf6; }
.qty-box { display:flex; align-items:center; justify-content:center; gap:14px; margin:16px 0 8px; }
.qty-btn { width:72px; height:72px; border:none; border-radius:22px; background:var(--accent); color:#fff; font-size:34px; font-weight:900; cursor:pointer; box-shadow:var(--shadow); }
.qty-value { min-width:120px; text-align:center; padding:14px 0; border-radius:20px; background:#fff7f2; border:2px solid #ffd9bf; font-size:42px; font-weight:900; }
.note { text-align:center; color:var(--sub); font-size:14px; margin-bottom:8px; }
.total-box { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
.total-card { background:#fff7f2; border:1px solid #ffd9bf; border-radius:18px; padding:14px; text-align:center; }
.total-label { color:var(--sub); font-size:13px; font-weight:800; margin-bottom:6px; }
.total-value { font-size:28px; font-weight:900; }
.list { display:flex; flex-direction:column; gap:10px; }
.row { border:1px solid var(--line); border-radius:16px; background:#fff; padding:12px; display:grid; grid-template-columns:1fr auto; gap:8px; align-items:center; }
.row-name { font-weight:900; font-size:16px; }
.row-sub { color:var(--sub); font-size:13px; margin-top:4px; }
.row-right { font-weight:900; font-size:16px; text-align:right; white-space:nowrap; }
.empty { background:#fff; border-radius:18px; box-shadow:var(--shadow); color:var(--sub); text-align:center; padding:28px 16px; }
.small { color:var(--sub); font-size:12px; line-height:1.65; margin-top:14px; }
@media (max-width:390px) {
  .name { font-size:15px; }
  .detail-title { font-size:24px; }
  .qty-btn { width:64px; height:64px; }
  .qty-value { min-width:100px; font-size:36px; }
}
</style>
</head>
<body>
<div class="app">
  <section id="screen-list" class="screen active">
    <h1>備品計算アプリ</h1>
    <p class="sub">写真を押して数量を入力してください</p>
    <div class="actions">
      <button class="btn btn-main" onclick="openSummary()">集計を見る</button>
      <button class="btn btn-sub" onclick="resetAll()">リセット</button>
    </div>
    <div class="summary-pill">
      <span id="pillCount">合計 0 点</span>
      <span id="pillAmount">¥0</span>
    </div>
    <div id="itemGrid" class="grid"></div>
  </section>

  <section id="screen-detail" class="screen">
    <span class="back" onclick="showScreen('screen-list')">← 一覧へ戻る</span>
    <div class="panel">
      <img id="detailImage" class="detail-image" src="" alt="">
      <div id="detailName" class="detail-title"></div>
      <div id="detailPrice" class="detail-price"></div>

      <div id="variantBox" class="variant-box">
        <div class="variant-label">号数を選択</div>
        <select id="variantSelect" class="variant-select"></select>
      </div>

      <div class="qty-box">
        <button class="qty-btn" onclick="changeQty(-1)">−</button>
        <div id="qtyValue" class="qty-value">0</div>
        <button class="qty-btn" onclick="changeQty(1)">＋</button>
      </div>
      <div class="note">数量を決めたら戻るか集計へ進んでください</div>
      <div class="actions">
        <button class="btn btn-main" onclick="saveAndBack()">この数量で戻る</button>
        <button class="btn btn-sub" onclick="saveAndSummary()">この数量で集計へ</button>
      </div>
    </div>
  </section>

  <section id="screen-summary" class="screen">
    <span class="back" onclick="showScreen('screen-list')">← 一覧へ戻る</span>
    <div class="panel">
      <div class="total-box">
        <div class="total-card"><div class="total-label">合計点数</div><div id="summaryCount" class="total-value">0</div></div>
        <div class="total-card"><div class="total-label">合計金額</div><div id="summaryAmount" class="total-value">¥0</div></div>
      </div>
      <div id="summaryList"></div>
      <div class="actions" style="margin-top:16px">
        <button class="btn btn-main" onclick="showScreen('screen-list')">一覧へ戻る</button>
        <button class="btn btn-danger" onclick="resetAll()">最初から</button>
      </div>
      <div class="small">道着関連はドロップダウンで号数を選べます。集計画面をそのままスクリーンショットしてください。</div>
    </div>
  </section>
</div>

<script>
const ITEMS = [{"name": "拳法面(白紐付)7mm 小〜大", "price": 36000, "image": "assets/helmet_white7.png"}, {"name": "拳法面(白紐付)7mm 特大", "price": 40000, "image": "assets/helmet_white7.png"}, {"name": "拳法面(白紐付)8mm 小〜大", "price": 39500, "image": "assets/helmet_white8.png"}, {"name": "拳法面(白紐付)8mm 特大", "price": 44000, "image": "assets/helmet_white8.png"}, {"name": "黒帆布拳法面(紺紐付)8mm 小〜大", "price": 43900, "image": "assets/helmet_black.png"}, {"name": "黒帆布拳法面(紺紐付)8mm 特大", "price": 48400, "image": "assets/helmet_black.png"}, {"name": "ベッチン拳法面(紺紐付)8mm 小〜大", "price": 52000, "image": "assets/helmet_navy.png"}, {"name": "ベッチン拳法面(紺紐付)8mm 特大", "price": 56500, "image": "assets/helmet_navy.png"}, {"name": "拳法胴(白紐付)大人用", "price": 29930, "image": "assets/do_adult.png"}, {"name": "拳法胴(白紐付)少年用", "price": 27180, "image": "assets/do_child.png"}, {"name": "一体胴(白紐付)大人用", "price": 36570, "image": "assets/body_adult.png"}, {"name": "一体胴(白紐付)少年用", "price": 36570, "image": "assets/body_child.png"}, {"name": "別製胴フトン(白紐付)大人用・少年用", "price": 10720, "image": "assets/futon_special.png"}, {"name": "並製胴フトン(白紐付)大人用のみ", "price": 8240, "image": "assets/futon_normal.png"}, {"name": "股当一般用(白紐付・男性用)", "price": 8240, "image": "assets/cup_male.png"}, {"name": "股当一般用(白紐付・女性用)", "price": 8240, "image": "assets/cup_female.png"}, {"name": "8オンスマジックテープ式グローブ 黒(大人用)", "price": 39800, "image": "assets/glove_8_tape.png"}, {"name": "8オンスマジックテープ式グローブ 赤(大人用)", "price": 39800, "image": "assets/glove_8_lace.png"}, {"name": "8オンス紐式グローブ 黒(大人用)", "price": 39800, "image": "assets/glove_8_tape.png"}, {"name": "8オンス紐式グローブ 赤(大人用)", "price": 39800, "image": "assets/glove_8_lace.png"}, {"name": "6オンスマジックテープ式グローブ 黒(少年用)", "price": 38800, "image": "assets/glove_6_tape.png"}, {"name": "6オンスマジックテープ式グローブ 赤(少年用)", "price": 38800, "image": "assets/glove_6_lace.png"}, {"name": "6オンス紐式グローブ 黒(少年用)", "price": 38800, "image": "assets/glove_6_tape.png"}, {"name": "6オンス紐式グローブ 赤(少年用)", "price": 38800, "image": "assets/glove_6_lace.png"}, {"name": "拳サポーター(親指ガード有) 1組", "price": 2530, "image": "assets/supporter_thumb.png"}, {"name": "拳サポーター(親指ガードなし) 1組", "price": 1760, "image": "assets/supporter_plain.png"}, {"name": "グローブラップ", "price": 2860, "image": "assets/glove_wrap.png"}, {"name": "トータルレッグガード(スネ用) 1組", "price": 3630, "image": "assets/legguard.png"}, {"name": "日本拳法衣セット", "image": "assets/uniform_set.png", "variants": [{"label": "0号", "price": 13330, "qty": 0}, {"label": "1号", "price": 14110, "qty": 0}, {"label": "2号", "price": 14950, "qty": 0}, {"label": "3号", "price": 17790, "qty": 0}, {"label": "4号", "price": 18650, "qty": 0}, {"label": "5号", "price": 20800, "qty": 0}, {"label": "6号", "price": 22890, "qty": 0}]}, {"name": "日本拳法衣 上衣", "image": "assets/uniform_top.png", "variants": [{"label": "0号", "price": 8240, "qty": 0}, {"label": "1号", "price": 8510, "qty": 0}, {"label": "2号", "price": 8980, "qty": 0}, {"label": "3号", "price": 11030, "qty": 0}, {"label": "4号", "price": 11520, "qty": 0}, {"label": "5号", "price": 13170, "qty": 0}, {"label": "6号", "price": 14260, "qty": 0}]}, {"name": "日本拳法衣 ズボン", "image": "assets/uniform_set.png", "variants": [{"label": "0号", "price": 3890, "qty": 0}, {"label": "1号", "price": 4300, "qty": 0}, {"label": "2号", "price": 4570, "qty": 0}, {"label": "3号", "price": 5260, "qty": 0}, {"label": "4号", "price": 5530, "qty": 0}, {"label": "5号", "price": 5930, "qty": 0}, {"label": "6号", "price": 6830, "qty": 0}]}, {"name": "日本拳法衣 帯", "image": "assets/mini_uniform.png", "variants": [{"label": "0号", "price": 1200, "qty": 0}, {"label": "1号", "price": 1300, "qty": 0}, {"label": "2号", "price": 1400, "qty": 0}, {"label": "3号", "price": 1500, "qty": 0}, {"label": "4号", "price": 1600, "qty": 0}, {"label": "5号", "price": 1700, "qty": 0}, {"label": "6号", "price": 1800, "qty": 0}]}, {"name": "左胸日本拳法連盟マーク追加", "price": 1900, "image": "assets/mark_logo.png"}, {"name": "日本拳法面用シールド", "price": 1190, "image": "assets/shield.png"}, {"name": "ミニチュア拳法衣", "price": 3300, "image": "assets/mini_uniform.png"}, {"name": "拳法バッグ(黒)", "price": 11000, "image": "assets/bag.png"}, {"name": "拳法バッグ(黒・マーク無し)", "price": 8800, "image": "assets/bag.png"}, {"name": "ゲルガード(2ヶ1組)", "price": 2530, "image": "assets/gel_guard.png"}, {"name": "バンテージVL-H(2ヶ1組)", "price": 2750, "image": "assets/vantage_h.png"}, {"name": "バンテージVL-C(2ヶ1組)", "price": 2310, "image": "assets/vantage_c.png"}, {"name": "ジョイントマット(15mm厚)", "price": 3300, "image": "assets/mat_15.png"}, {"name": "リバーシブルジョイントマット(20mm厚)", "price": 4500, "image": "assets/mat_20.png"}, {"name": "武道シューズ", "price": 9200, "image": "assets/shoes.png"}];
let currentIndex = 0;
let currentQty = 0;
let currentVariantIndex = 0;

function yen(num) {
  return "¥" + Number(num).toLocaleString("ja-JP");
}

function itemQty(item) {
  if (item.variants) return item.variants.reduce((s,v)=>s+(v.qty||0),0);
  return item.qty || 0;
}

function itemAmount(item) {
  if (item.variants) return item.variants.reduce((s,v)=>s+((v.qty||0)*v.price),0);
  return (item.qty || 0) * item.price;
}

function totalCount() {
  return ITEMS.reduce((s,item)=>s+itemQty(item),0);
}

function totalAmount() {
  return ITEMS.reduce((s,item)=>s+itemAmount(item),0);
}

function getVariantPriceText(item) {
  const prices = item.variants.map(v=>v.price);
  return yen(Math.min(...prices)) + "〜" + yen(Math.max(...prices));
}

function summaryEntries() {
  const rows = [];
  ITEMS.forEach(item => {
    if (item.variants) {
      item.variants.forEach(v => {
        if ((v.qty||0) > 0) rows.push({ name: item.name + " " + v.label, price: v.price, qty: v.qty });
      });
    } else if ((item.qty||0) > 0) {
      rows.push({ name: item.name, price: item.price, qty: item.qty });
    }
  });
  return rows;
}

function updatePill() {
  document.getElementById('pillCount').textContent = `合計 ${totalCount()} 点`;
  document.getElementById('pillAmount').textContent = yen(totalAmount());
}

function renderGrid() {
  const grid = document.getElementById('itemGrid');
  grid.innerHTML = '';
  ITEMS.forEach((item, index) => {
    const div = document.createElement('div');
    div.className = 'card';
    const qty = itemQty(item);
    const priceText = item.variants ? `号数選択 ${getVariantPriceText(item)}` : `単価 ${yen(item.price)}`;
    div.innerHTML = `
      <button onclick="openDetail(${index})">
        <div class="thumb-wrap"><img class="thumb" src="${item.image}" alt="${item.name}" loading="lazy"></div>
        ${qty > 0 ? `<div class="qty-badge">${qty}</div>` : ''}
        <div class="card-body">
          <div class="name">${item.name}</div>
          <p class="price">${priceText}</p>
        </div>
      </button>
    `;
    grid.appendChild(div);
  });
  updatePill();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0, behavior:'smooth'});
}

function openDetail(index) {
  currentIndex = index;
  const item = ITEMS[index];
  document.getElementById('detailImage').src = item.image;
  document.getElementById('detailImage').alt = item.name;
  document.getElementById('detailName').textContent = item.name;

  const box = document.getElementById('variantBox');
  const select = document.getElementById('variantSelect');

  if (item.variants) {
    box.style.display = 'block';
    select.innerHTML = item.variants.map((v,i)=>`<option value="${i}">${v.label} / ${yen(v.price)}</option>`).join('');
    currentVariantIndex = 0;
    select.value = '0';
    currentQty = item.variants[0].qty || 0;
    document.getElementById('detailPrice').textContent = `価格 ${yen(item.variants[0].price)}`;
  } else {
    box.style.display = 'none';
    currentQty = item.qty || 0;
    document.getElementById('detailPrice').textContent = `単価 ${yen(item.price)}`;
  }

  document.getElementById('qtyValue').textContent = currentQty;
  showScreen('screen-detail');
}

document.getElementById('variantSelect').addEventListener('change', (e) => {
  currentVariantIndex = Number(e.target.value);
  const item = ITEMS[currentIndex];
  const variant = item.variants[currentVariantIndex];
  currentQty = variant.qty || 0;
  document.getElementById('qtyValue').textContent = currentQty;
  document.getElementById('detailPrice').textContent = `価格 ${yen(variant.price)}`;
});

function changeQty(diff) {
  currentQty = Math.max(0, currentQty + diff);
  document.getElementById('qtyValue').textContent = currentQty;
}

function saveCurrentQty() {
  const item = ITEMS[currentIndex];
  if (item.variants) {
    item.variants[currentVariantIndex].qty = currentQty;
  } else {
    item.qty = currentQty;
  }
  renderGrid();
}

function saveAndBack() {
  saveCurrentQty();
  showScreen('screen-list');
}

function saveAndSummary() {
  saveCurrentQty();
  openSummary();
}

function openSummary() {
  renderSummary();
  showScreen('screen-summary');
}

function renderSummary() {
  document.getElementById('summaryCount').textContent = totalCount();
  document.getElementById('summaryAmount').textContent = yen(totalAmount());
  const rows = summaryEntries();
  const wrap = document.getElementById('summaryList');
  if (!rows.length) {
    wrap.innerHTML = '<div class="empty">まだ何も選ばれていません</div>';
    return;
  }
  wrap.innerHTML = '<div class="list">' + rows.map(row => `
    <div class="row">
      <div>
        <div class="row-name">${row.name}</div>
        <div class="row-sub">${yen(row.price)} × ${row.qty} 点</div>
      </div>
      <div class="row-right">${yen(row.price * row.qty)}</div>
    </div>
  `).join('') + '</div>';
}

function resetAll() {
  if (!confirm('数量をすべて0に戻しますか？')) return;
  ITEMS.forEach(item => {
    if (item.variants) item.variants.forEach(v => v.qty = 0);
    else item.qty = 0;
  });
  renderGrid();
  renderSummary();
  showScreen('screen-list');
}

renderGrid();
</script>
</body>
</html>
